<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPE Issue Register</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#f0f4ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="./icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --font: -apple-system, 'SF Pro Display', 'SF Pro Text', BlinkMacSystemFont, 'Helvetica Neue', sans-serif;

            /* Liquid Glass Surfaces */
            --glass-1: rgba(255,255,255,0.55);
            --glass-2: rgba(255,255,255,0.35);
            --glass-3: rgba(255,255,255,0.18);
            --glass-border: rgba(255,255,255,0.60);
            --glass-border-subtle: rgba(255,255,255,0.30);

            /* Specular & Depth */
            --spec-top: inset 0 1px 0 rgba(255,255,255,0.75);
            --spec-bottom: inset 0 -1px 0 rgba(0,0,0,0.04);
            --shadow-glass: 0 4px 24px rgba(0,0,0,0.07), 0 1px 4px rgba(0,0,0,0.04);
            --shadow-card: 0 8px 40px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.05);
            --shadow-float: 0 20px 60px rgba(0,0,0,0.12), 0 4px 16px rgba(0,0,0,0.06);

            /* Blur */
            --blur-glass: blur(40px) saturate(200%) brightness(108%);
            --blur-subtle: blur(20px) saturate(180%);

            /* Accent */
            --blue: #007AFF;
            --blue-light: rgba(0,122,255,0.12);
            --blue-medium: rgba(0,122,255,0.20);
            --indigo: #5856D6;
            --indigo-light: rgba(88,86,214,0.10);
            --green: #34C759;
            --red: #FF3B30;
            --orange: #FF9500;
            --teal: #5AC8FA;

            /* Text */
            --text-primary: rgba(0,0,0,0.88);
            --text-secondary: rgba(0,0,0,0.55);
            --text-tertiary: rgba(0,0,0,0.35);
            --text-on-glass: rgba(0,0,0,0.80);

            /* Background mesh */
            --bg: #eef2ff;
        }

        [data-theme="dark"] {
            --glass-1: rgba(28,28,40,0.72);
            --glass-2: rgba(28,28,40,0.50);
            --glass-3: rgba(28,28,40,0.30);
            --glass-border: rgba(255,255,255,0.12);
            --glass-border-subtle: rgba(255,255,255,0.07);

            --spec-top: inset 0 1px 0 rgba(255,255,255,0.12);
            --spec-bottom: inset 0 -1px 0 rgba(0,0,0,0.3);
            --shadow-glass: 0 4px 24px rgba(0,0,0,0.4), 0 1px 4px rgba(0,0,0,0.3);
            --shadow-card: 0 8px 40px rgba(0,0,0,0.50), 0 2px 8px rgba(0,0,0,0.30);
            --shadow-float: 0 20px 60px rgba(0,0,0,0.60), 0 4px 16px rgba(0,0,0,0.40);

            --blur-glass: blur(40px) saturate(160%) brightness(80%);

            --blue: #0A84FF;
            --blue-light: rgba(10,132,255,0.15);
            --blue-medium: rgba(10,132,255,0.25);
            --indigo: #7877e6;
            --indigo-light: rgba(120,119,230,0.15);
            --green: #30D158;
            --orange: #FF9F0A;
            --teal: #64D2FF;

            --text-primary: rgba(255,255,255,0.92);
            --text-secondary: rgba(255,255,255,0.55);
            --text-tertiary: rgba(255,255,255,0.30);
            --text-on-glass: rgba(255,255,255,0.85);

            --bg: #080812;
        }

        /* ── BODY & BACKGROUND MESH ─────────────────────────────── */
        body {
            font-family: var(--font);
            background-color: var(--bg);
            min-height: 100vh;
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            transition: background-color 0.4s ease, color 0.3s ease;
            overflow-x: hidden;
        }

        /* Ambient light orbs */
        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            filter: blur(80px);
        }
        body::before {
            width: 600px; height: 600px;
            top: -150px; right: -100px;
            background: radial-gradient(circle, rgba(120,119,255,0.20) 0%, rgba(88,86,214,0.10) 40%, transparent 70%);
            animation: orbFloat1 18s ease-in-out infinite;
        }
        body::after {
            width: 500px; height: 500px;
            bottom: -100px; left: -80px;
            background: radial-gradient(circle, rgba(0,122,255,0.18) 0%, rgba(90,200,250,0.10) 40%, transparent 70%);
            animation: orbFloat2 22s ease-in-out infinite;
        }
        [data-theme="dark"] body::before {
            background: radial-gradient(circle, rgba(88,86,214,0.25) 0%, rgba(120,119,255,0.10) 40%, transparent 70%);
        }
        [data-theme="dark"] body::after {
            background: radial-gradient(circle, rgba(10,132,255,0.20) 0%, rgba(100,210,255,0.08) 40%, transparent 70%);
        }

        /* ── LIQUID GLASS BASE MIXIN ────────────────────────────── */
        .lg {
            background: var(--glass-1);
            backdrop-filter: var(--blur-glass);
            -webkit-backdrop-filter: var(--blur-glass);
            border: 1px solid var(--glass-border);
            box-shadow: var(--spec-top), var(--spec-bottom), var(--shadow-glass);
            position: relative;
            transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }
        .lg::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: linear-gradient(135deg, rgba(255,255,255,0.25) 0%, transparent 50%, rgba(255,255,255,0.05) 100%);
            pointer-events: none;
            z-index: 0;
        }
        .lg > * { position: relative; z-index: 1; }

        .lg-card {
            background: var(--glass-2);
            backdrop-filter: var(--blur-glass);
            -webkit-backdrop-filter: var(--blur-glass);
            border: 1px solid var(--glass-border);
            box-shadow: var(--spec-top), var(--spec-bottom), var(--shadow-card);
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.35s cubic-bezier(0.16,1,0.3,1);
        }
        .lg-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 60%;
            background: linear-gradient(180deg, rgba(255,255,255,0.18) 0%, transparent 100%);
            pointer-events: none;
            z-index: 0;
            border-radius: 20px 20px 0 0;
        }
        .lg-card > * { position: relative; z-index: 1; }
        .lg-card:hover {
            box-shadow: var(--spec-top), var(--spec-bottom), var(--shadow-float);
            transform: translateY(-1px);
        }

        /* ── OVERLAY ────────────────────────────────────────────── */
        #loading-overlay {
            position: fixed; inset: 0; z-index: 999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 20px;
            background: var(--bg);
            backdrop-filter: blur(60px);
            -webkit-backdrop-filter: blur(60px);
            transition: opacity 0.4s ease;
        }
        .loader-glass {
            background: var(--glass-1);
            backdrop-filter: var(--blur-glass);
            -webkit-backdrop-filter: var(--blur-glass);
            border: 1px solid var(--glass-border);
            box-shadow: var(--spec-top), var(--shadow-float);
            border-radius: 24px;
            padding: 32px 48px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .loader-glass::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 50%;
            background: linear-gradient(180deg, rgba(255,255,255,0.3) 0%, transparent 100%);
            pointer-events: none;
        }
        .loader-icon {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, var(--blue) 0%, var(--indigo) 100%);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px;
            box-shadow: 0 8px 24px rgba(0,122,255,0.35), inset 0 1px 0 rgba(255,255,255,0.3);
        }
        .loader-title {
            font-size: 13px; font-weight: 600;
            letter-spacing: 0.08em; text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 16px;
            position: relative; z-index: 1;
        }
        .progress-track {
            width: 200px; height: 3px;
            background: rgba(0,0,0,0.06);
            border-radius: 100px;
            overflow: hidden;
            position: relative; z-index: 1;
        }
        [data-theme="dark"] .progress-track { background: rgba(255,255,255,0.08); }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--blue), var(--indigo), var(--teal));
            border-radius: 100px;
            position: absolute;
            animation: progressSlide 1.8s ease-in-out infinite;
        }

        /* ── NAVIGATION ─────────────────────────────────────────── */
        nav {
            position: sticky; top: 0; z-index: 50;
            background: var(--glass-1);
            backdrop-filter: var(--blur-glass);
            -webkit-backdrop-filter: var(--blur-glass);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: var(--spec-top), 0 1px 0 var(--glass-border-subtle), var(--shadow-glass);
            padding: 12px 24px;
            display: flex; align-items: center; justify-content: space-between;
            transition: background 0.3s ease;
        }
        nav::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 50%;
            background: linear-gradient(180deg, rgba(255,255,255,0.25) 0%, transparent 100%);
            pointer-events: none;
        }
        nav > * { position: relative; z-index: 1; }

        .nav-brand-icon {
            width: 40px; height: 40px;
            background: linear-gradient(145deg, var(--blue) 0%, var(--indigo) 100%);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 16px rgba(0,122,255,0.30), inset 0 1px 0 rgba(255,255,255,0.25);
            flex-shrink: 0;
        }

        .nav-title { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; color: var(--text-primary); }
        .nav-subtitle {
            font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
            text-transform: uppercase; color: var(--blue);
            display: flex; align-items: center; gap: 5px;
        }
        .live-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 0 0 rgba(52,199,89,0.5);
            animation: livePulse 2s ease-out infinite;
        }

        /* Pills */
        .pill {
            background: var(--glass-2);
            backdrop-filter: var(--blur-subtle);
            -webkit-backdrop-filter: var(--blur-subtle);
            border: 1px solid var(--glass-border);
            box-shadow: var(--spec-top), var(--shadow-glass);
            border-radius: 100px;
            padding: 6px 14px;
            font-size: 12px; font-weight: 600;
            color: var(--text-secondary);
            display: flex; align-items: center; gap: 6px;
            white-space: nowrap;
            position: relative; overflow: hidden;
        }
        .pill::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 50%;
            background: linear-gradient(180deg, rgba(255,255,255,0.25) 0%, transparent 100%);
            pointer-events: none;
        }
        .pill > * { position: relative; z-index: 1; }

        /* Install button */
        #install-btn {
            background: linear-gradient(135deg, var(--blue) 0%, var(--indigo) 100%);
            border: none;
            border-radius: 100px;
            padding: 8px 16px;
            font-size: 12px; font-weight: 700;
            color: white;
            cursor: pointer;
            display: none;
            align-items: center; gap: 6px;
            box-shadow: 0 4px 16px rgba(0,122,255,0.30), inset 0 1px 0 rgba(255,255,255,0.25);
            animation: installPulse 2.5s ease-in-out infinite;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        #install-btn:hover { transform: scale(1.03); box-shadow: 0 6px 24px rgba(0,122,255,0.45); }
        #install-btn:active { transform: scale(0.97); }

        /* Theme toggle */
        .theme-toggle {
            width: 46px; height: 26px;
            background: var(--glass-2);
            backdrop-filter: var(--blur-subtle);
            -webkit-backdrop-filter: var(--blur-subtle);
            border: 1px solid var(--glass-border);
            border-radius: 100px;
            cursor: pointer;
            position: relative;
            box-shadow: var(--spec-top), var(--shadow-glass);
            transition: background 0.3s ease;
            overflow: hidden;
        }
        .theme-toggle::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 50%;
            background: linear-gradient(180deg, rgba(255,255,255,0.35) 0%, transparent 100%);
            border-radius: 100px 100px 0 0;
            pointer-events: none;
        }
        .toggle-knob {
            position: absolute; top: 2px; left: 2px;
            width: 20px; height: 20px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.9);
            display: flex; align-items: center; justify-content: center;
            font-size: 10px;
            transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
            z-index: 1;
        }
        [data-theme="dark"] .toggle-knob { transform: translateX(20px); }

        /* ── MAIN LAYOUT ─────────────────────────────────────────── */
        .page { max-width: 1100px; margin: 0 auto; padding: 24px 20px 40px; }
        .stack > * + * { margin-top: 16px; }

        /* ── SEARCH PANEL ───────────────────────────────────────── */
        .search-panel {
            border-radius: 24px;
            padding: 24px;
            animation: fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) both;
        }
        .section-label {
            font-size: 11px; font-weight: 700;
            letter-spacing: 0.09em; text-transform: uppercase;
            color: var(--text-tertiary);
            display: flex; align-items: center; gap: 7px;
            margin-bottom: 18px;
        }
        .section-label i { color: var(--blue); font-size: 12px; }

        .search-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
        }
        .field-label {
            font-size: 10px; font-weight: 700;
            letter-spacing: 0.08em; text-transform: uppercase;
            color: var(--text-tertiary);
            margin-bottom: 6px;
            display: flex; align-items: center; gap: 5px;
        }
        .field-label i { color: var(--blue); font-size: 11px; }
        .field-wrap { position: relative; }
        .field-icon {
            position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
            color: var(--text-tertiary); font-size: 13px;
            pointer-events: none; transition: color 0.2s ease;
        }
        .lg-input {
            width: 100%;
            background: var(--glass-3);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 10px 12px 10px 36px;
            font-size: 14px; font-family: var(--font);
            color: var(--text-primary);
            outline: none;
            box-shadow: var(--spec-top), inset 0 1px 3px rgba(0,0,0,0.04);
            transition: all 0.2s ease;
        }
        .lg-input::placeholder { color: var(--text-tertiary); }
        .lg-input:focus {
            background: var(--glass-2);
            border-color: rgba(0,122,255,0.45);
            box-shadow: var(--spec-top), inset 0 1px 3px rgba(0,0,0,0.04), 0 0 0 3px var(--blue-light);
        }
        .lg-input:focus ~ .field-icon { color: var(--blue); }
        .field-wrap:focus-within .field-icon { color: var(--blue); }

        .reset-btn {
            background: none; border: none; cursor: pointer;
            font-size: 12px; font-weight: 700;
            color: var(--red); font-family: var(--font);
            display: flex; align-items: center; gap: 6px;
            padding: 7px 12px; border-radius: 10px;
            opacity: 0.85;
            transition: opacity 0.15s ease, background 0.15s ease;
        }
        .reset-btn:hover { opacity: 1; background: rgba(255,59,48,0.06); }

        /* ── RECORD CARDS ───────────────────────────────────────── */
        .record-card {
            border-radius: 20px;
            padding: 20px 22px;
            animation: fadeUp 0.4s cubic-bezier(0.16,1,0.3,1) both;
            display: flex; gap: 20px;
        }
        @media (max-width: 700px) {
            .record-card { flex-direction: column; }
        }

        /* Identity block */
        .identity {
            min-width: 200px; flex-shrink: 0;
            padding-right: 20px;
            border-right: 1px solid var(--glass-border);
            display: flex; flex-direction: column; gap: 12px;
        }
        @media (max-width: 700px) {
            .identity {
                border-right: none;
                border-bottom: 1px solid var(--glass-border);
                padding-right: 0; padding-bottom: 16px;
            }
        }
        .identity-name {
            font-size: 17px; font-weight: 700; letter-spacing: -0.2px;
            color: var(--text-primary);
        }
        .identity-meta-label {
            font-size: 10px; font-weight: 700;
            letter-spacing: 0.07em; text-transform: uppercase;
            color: var(--text-tertiary); margin-bottom: 2px;
        }
        .identity-meta-value {
            font-size: 13px; font-weight: 600;
            font-variant-numeric: tabular-nums;
            color: var(--blue);
        }
        .dept-badge {
            display: inline-flex; align-items: center;
            background: var(--indigo-light);
            border: 1px solid rgba(88,86,214,0.20);
            border-radius: 8px;
            padding: 4px 10px;
            font-size: 11px; font-weight: 700;
            color: var(--indigo);
            max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }

        /* History block */
        .history { flex: 1; min-width: 0; }
        .history-label {
            font-size: 11px; font-weight: 700;
            letter-spacing: 0.07em; text-transform: uppercase;
            color: var(--orange);
            display: flex; align-items: center; gap: 6px;
            margin-bottom: 14px;
        }
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
            gap: 10px;
        }
        .ppe-item-card {
            background: var(--glass-3);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border-subtle);
            border-radius: 14px;
            padding: 12px;
            box-shadow: var(--spec-top), 0 2px 8px rgba(0,0,0,0.04);
            overflow: hidden;
            position: relative;
            transition: all 0.2s ease;
        }
        .ppe-item-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 40%;
            background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 100%);
            pointer-events: none;
        }
        .ppe-item-card:hover {
            background: var(--glass-2);
            border-color: var(--glass-border);
            transform: scale(1.01);
        }
        .ppe-item-name {
            font-size: 11px; font-weight: 700;
            letter-spacing: 0.04em; text-transform: uppercase;
            color: var(--blue);
            border-bottom: 1px solid var(--glass-border-subtle);
            padding-bottom: 8px; margin-bottom: 8px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            position: relative; z-index: 1;
        }
        .ppe-records { max-height: 120px; overflow-y: auto; position: relative; z-index: 1; display: flex; flex-direction: column; gap: 5px; }
        .ppe-records::-webkit-scrollbar { width: 3px; }
        .ppe-records::-webkit-scrollbar-track { background: transparent; }
        .ppe-records::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }
        .ppe-record-row {
            display: flex; justify-content: space-between; align-items: center;
            gap: 6px;
        }
        .ppe-date {
            font-size: 11px; font-variant-numeric: tabular-nums;
            color: var(--text-secondary); font-weight: 500;
        }
        .ppe-qty-wrap { display: flex; align-items: center; gap: 4px; }
        .ppe-qty {
            background: var(--blue-medium);
            border: 1px solid rgba(0,122,255,0.25);
            border-radius: 6px;
            padding: 2px 7px;
            font-size: 10px; font-weight: 800;
            color: var(--blue);
            white-space: nowrap;
        }
        .ppe-size {
            background: rgba(255,149,0,0.12);
            border: 1px solid rgba(255,149,0,0.20);
            border-radius: 5px;
            padding: 1px 6px;
            font-size: 9px; font-weight: 800;
            color: var(--orange);
            white-space: nowrap;
        }

        /* ── PAGINATION ─────────────────────────────────────────── */
        .pagination {
            border-radius: 20px;
            padding: 14px 20px;
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 12px;
        }
        .page-info { font-size: 12px; font-weight: 500; color: var(--text-secondary); }
        .page-info strong { color: var(--text-primary); font-weight: 700; }
        .page-info .count { color: var(--blue); font-weight: 700; }
        .page-btns { display: flex; gap: 8px; }
        .page-btn {
            background: var(--glass-2);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 7px 14px;
            font-size: 12px; font-weight: 700;
            color: var(--text-primary);
            cursor: pointer;
            font-family: var(--font);
            box-shadow: var(--spec-top), var(--shadow-glass);
            display: flex; align-items: center; gap: 5px;
            transition: all 0.15s ease;
        }
        .page-btn:hover:not(:disabled) {
            background: var(--glass-1);
            box-shadow: var(--spec-top), var(--shadow-card);
            transform: scale(1.02);
        }
        .page-btn:active:not(:disabled) { transform: scale(0.97); }
        .page-btn:disabled { opacity: 0.3; cursor: default; }

        /* ── EMPTY / LOADER STATES ──────────────────────────────── */
        .state-block {
            text-align: center; padding: 64px 24px;
            border-radius: 20px;
        }
        .state-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.3; color: var(--blue); }
        .state-title { font-size: 13px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-secondary); }
        .state-sub { font-size: 12px; color: var(--text-tertiary); margin-top: 4px; }

        /* count badge in nav */
        .count-badge {
            font-size: 11px; font-weight: 700;
            font-variant-numeric: tabular-nums;
            color: var(--green);
            font-family: 'SF Mono', 'Fira Mono', monospace;
        }

        /* ── ANIMATIONS ─────────────────────────────────────────── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); filter: blur(2px); }
            to   { opacity: 1; transform: translateY(0);    filter: blur(0); }
        }
        @keyframes progressSlide {
            0%   { left: -50%; width: 40%; }
            50%  { width: 65%; }
            100% { left: 110%; width: 40%; }
        }
        @keyframes livePulse {
            0%   { box-shadow: 0 0 0 0 rgba(52,199,89,0.5); }
            70%  { box-shadow: 0 0 0 5px rgba(52,199,89,0); }
            100% { box-shadow: 0 0 0 0 rgba(52,199,89,0); }
        }
        @keyframes orbFloat1 {
            0%,100% { transform: translate(0,0) scale(1); }
            33% { transform: translate(-40px,30px) scale(1.08); }
            66% { transform: translate(30px,-20px) scale(0.94); }
        }
        @keyframes orbFloat2 {
            0%,100% { transform: translate(0,0) scale(1); }
            40% { transform: translate(50px,-35px) scale(1.06); }
            70% { transform: translate(-20px,25px) scale(0.97); }
        }
        @keyframes installPulse {
            0%,100% { box-shadow: 0 4px 16px rgba(0,122,255,0.30), inset 0 1px 0 rgba(255,255,255,0.25); }
            50%      { box-shadow: 0 4px 24px rgba(0,122,255,0.55), inset 0 1px 0 rgba(255,255,255,0.25); }
        }
    </style>
</head>
<body>

    <!-- Loading Overlay -->
    <div id="loading-overlay">
        <div class="loader-glass">
            <div class="loader-icon">
                <i class="fa-solid fa-shield-halved" style="color:white;font-size:20px;"></i>
            </div>
            <div class="loader-title">Loading Registry</div>
            <div class="progress-track">
                <div class="progress-fill"></div>
            </div>
        </div>
    </div>

    <!-- Navigation -->
    <nav>
        <div style="display:flex;align-items:center;gap:12px;">
            <div class="nav-brand-icon">
                <i class="fa-solid fa-shield-halved" style="color:white;font-size:18px;"></i>
            </div>
            <div>
                <div class="nav-title">PPE Issue</div>
                <div class="nav-subtitle">
                    <div class="live-dot"></div>
                    Live Distribution Stream
                </div>
            </div>
        </div>

        <div style="display:flex;align-items:center;gap:10px;">
            <button id="install-btn" onclick="triggerInstallPrompt()">
                <i class="fa-solid fa-download" style="font-size:11px;"></i>
                Install App
            </button>
            <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
                <div class="toggle-knob" id="toggle-knob">
                    <i class="fa-solid fa-sun" id="theme-icon" style="color:#f59e0b;font-size:10px;"></i>
                </div>
            </button>
            <div class="pill">
                Total: <span class="count-badge" id="total-count">0</span>
            </div>
        </div>
    </nav>

    <!-- Page -->
    <div class="page">
        <div class="stack">

            <!-- Search Panel -->
            <div class="lg search-panel">
                <div class="section-label">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    Filter & Search
                </div>
                <div class="search-grid">
                    <div>
                        <div class="field-label"><i class="fa-solid fa-id-card"></i>Card Number</div>
                        <div class="field-wrap">
                            <i class="fa-solid fa-id-card field-icon"></i>
                            <input class="lg-input" type="text" id="search-card" oninput="debounceSearch()" placeholder="Search card ID…">
                        </div>
                    </div>
                    <div>
                        <div class="field-label"><i class="fa-solid fa-user"></i>Employee Name</div>
                        <div class="field-wrap">
                            <i class="fa-solid fa-user field-icon"></i>
                            <input class="lg-input" type="text" id="search-name" oninput="debounceSearch()" placeholder="Search name…">
                        </div>
                    </div>
                    <div>
                        <div class="field-label"><i class="fa-solid fa-building"></i>Section / Branch</div>
                        <div class="field-wrap">
                            <i class="fa-solid fa-building field-icon"></i>
                            <input class="lg-input" type="text" id="search-dept" oninput="debounceSearch()" placeholder="Search department…">
                        </div>
                    </div>
                    <div>
                        <div class="field-label"><i class="fa-solid fa-helmet-safety"></i>PPE Gear Type</div>
                        <div class="field-wrap">
                            <i class="fa-solid fa-helmet-safety field-icon"></i>
                            <input class="lg-input" type="text" id="search-item" list="item-options" oninput="debounceSearch()" placeholder="Select gear type…">
                            <datalist id="item-options"></datalist>
                        </div>
                    </div>
                </div>
                <div style="display:flex;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:1px solid var(--glass-border-subtle);">
                    <button class="reset-btn" onclick="resetFilters()">
                        <i class="fa-solid fa-arrow-rotate-left" style="font-size:10px;"></i>
                        Reset Filters
                    </button>
                </div>
            </div>

            <!-- Inline Loader -->
            <div id="inline-loader" class="lg state-block">
                <div class="state-icon"><i class="fa-solid fa-chart-simple"></i></div>
                <div class="state-title">Loading Records…</div>
            </div>

            <!-- Record Cards -->
            <div id="master-records-deck" class="stack" style="display:none;"></div>

            <!-- Empty State -->
            <div id="no-results" class="lg state-block" style="display:none;">
                <div class="state-icon"><i class="fa-solid fa-hourglass-empty"></i></div>
                <div class="state-title">No Results Found</div>
                <div class="state-sub">Try adjusting your search filters</div>
            </div>

            <!-- Pagination -->
            <div id="pagination-footer" class="lg pagination" style="display:none;">
                <div class="page-info">
                    Showing <strong id="page-start">0</strong>–<strong id="page-end">0</strong>
                    of <span class="count" id="filtered-count">0</span> records
                </div>
                <div class="page-btns">
                    <button class="page-btn" id="btn-prev" onclick="changePage(-1)">
                        <i class="fa-solid fa-angle-left" style="font-size:10px;"></i> Previous
                    </button>
                    <button class="page-btn" id="btn-next" onclick="changePage(1)">
                        Next <i class="fa-solid fa-angle-right" style="font-size:10px;"></i>
                    </button>
                </div>
            </div>

        </div>
    </div>

    <script>
        const apiEndpoint = "https://script.google.com/macros/s/AKfycbydwxwb1CYJtjLcWG_OKpcKIBdl4KQ7xeKe12PvJzwOzxu3Mvwu-OU9kvybNTji3iIX/exec";

        let allMasterData = [], currentFilteredData = [];
        let currentPage = 1;
        const rowsPerPage = 50;
        let searchTimeout = null;

        // ── PWA INSTALL ───────────────────────────────────────────
        let deferredPrompt = null;
        const installBtn = document.getElementById('install-btn');
        window.addEventListener('beforeinstallprompt', e => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'flex';
        });
        window.addEventListener('appinstalled', () => {
            deferredPrompt = null;
            installBtn.style.display = 'none';
        });
        function triggerInstallPrompt() {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then(r => {
                if (r.outcome === 'accepted') installBtn.style.display = 'none';
                deferredPrompt = null;
            });
        }

        // ── THEME ─────────────────────────────────────────────────
        function toggleTheme() {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            const icon = document.getElementById('theme-icon');
            if (isDark) {
                document.body.removeAttribute('data-theme');
                icon.className = 'fa-solid fa-sun';
                icon.style.color = '#f59e0b';
            } else {
                document.body.setAttribute('data-theme', 'dark');
                icon.className = 'fa-solid fa-moon';
                icon.style.color = '#818cf8';
            }
        }

        // ── DATA LOAD ─────────────────────────────────────────────
        window.onload = function () {
            fetch(apiEndpoint)
                .then(r => { if (!r.ok) throw new Error('Network error'); return r.json(); })
                .then(data => {
                    if (data.error) throw new Error(data.error);

                    // Name consolidation
                    const reg = {};
                    data.forEach(row => {
                        const card = (row.cardNo || '').toString().trim();
                        const name = (row.name || '').toString().trim();
                        if (!card || !name) return;
                        if (!reg[card]) reg[card] = {};
                        reg[card][name] = (reg[card][name] || 0) + 1;
                    });
                    const canonical = {};
                    for (const c in reg) {
                        let top = -1, winner = '';
                        for (const n in reg[c]) if (reg[c][n] > top) { top = reg[c][n]; winner = n; }
                        canonical[c] = winner;
                    }
                    data.forEach(row => {
                        const c = (row.cardNo || '').toString().trim();
                        if (canonical[c]) row.name = canonical[c];
                    });

                    // Datalist
                    const dl = document.getElementById('item-options');
                    [...new Set(data.map(r => (r.item || '').toString().trim()).filter(Boolean))].sort()
                        .forEach(v => { const o = document.createElement('option'); o.value = v; dl.appendChild(o); });

                    allMasterData = data.reverse();
                    currentFilteredData = [...allMasterData];
                    document.getElementById('total-count').textContent = allMasterData.length;
                    document.getElementById('loading-overlay').style.display = 'none';
                    document.getElementById('inline-loader').style.display = 'none';
                    document.getElementById('master-records-deck').style.display = '';
                    document.getElementById('pagination-footer').style.display = 'flex';
                    goToPage(1);
                })
                .catch(err => {
                    document.getElementById('loading-overlay').innerHTML = `
                        <div class="loader-glass" style="text-align:center;">
                            <i class="fa-solid fa-triangle-exclamation" style="color:var(--red);font-size:28px;margin-bottom:12px;display:block;"></i>
                            <div style="font-size:13px;font-weight:700;color:var(--red);margin-bottom:6px;">Sync Error</div>
                            <div style="font-size:12px;color:var(--text-secondary);max-width:280px;">${err.message}</div>
                        </div>`;
                });
        };

        // ── RENDER ────────────────────────────────────────────────
        function renderTableMatrix() {
            const deck = document.getElementById('master-records-deck');
            const noRes = document.getElementById('no-results');
            const footer = document.getElementById('pagination-footer');

            deck.innerHTML = '';
            const total = currentFilteredData.length;
            document.getElementById('filtered-count').textContent = total;

            if (total === 0) {
                noRes.style.display = '';
                footer.style.display = 'none';
                document.getElementById('page-start').textContent = '0';
                document.getElementById('page-end').textContent = '0';
                document.getElementById('btn-prev').disabled = true;
                document.getElementById('btn-next').disabled = true;
                return;
            }
            noRes.style.display = 'none';
            footer.style.display = 'flex';

            const start = (currentPage - 1) * rowsPerPage;
            const end = Math.min(start + rowsPerPage, total);
            const slice = currentFilteredData.slice(start, end);

            document.getElementById('page-start').textContent = start + 1;
            document.getElementById('page-end').textContent = end;
            document.getElementById('btn-prev').disabled = currentPage === 1;
            document.getElementById('btn-next').disabled = end >= total;

            // Aggregate by employee
            const empMap = {}, empOrder = [];
            slice.forEach(row => {
                const key = row.cardNo + '_' + row.name;
                if (!empMap[key]) {
                    empMap[key] = { name: row.name, cardNo: row.cardNo, section: row.section, items: {} };
                    empOrder.push(key);
                }
                if (!empMap[key].items[row.item]) empMap[key].items[row.item] = [];
                empMap[key].items[row.item].push({ date: row.issuedOn, qty: row.qty, size: row.size });
            });

            const frag = document.createDocumentFragment();
            empOrder.forEach((key, i) => {
                const emp = empMap[key];
                const el = document.createElement('div');
                el.className = 'lg-card record-card';
                el.style.animationDelay = `${i * 15}ms`;

                let itemsHTML = '';
                for (const itemName in emp.items) {
                    let rowsHTML = emp.items[itemName].map(r => {
                        const sizeHTML = r.size ? `<span class="ppe-size">Sz: ${r.size}</span>` : '';
                        return `<div class="ppe-record-row">
                            <span class="ppe-date">${r.date}</span>
                            <div class="ppe-qty-wrap">
                                <span class="ppe-qty">${r.qty} Qty</span>
                                ${sizeHTML}
                            </div>
                        </div>`;
                    }).join('');
                    itemsHTML += `
                        <div class="ppe-item-card">
                            <div class="ppe-item-name" title="${itemName}">${itemName}</div>
                            <div class="ppe-records">${rowsHTML}</div>
                        </div>`;
                }

                el.innerHTML = `
                    <div class="identity">
                        <div>
                            <div class="identity-meta-label">Employee</div>
                            <div class="identity-name">${emp.name}</div>
                        </div>
                        <div>
                            <div class="identity-meta-label">Card No</div>
                            <div class="identity-meta-value">${emp.cardNo}</div>
                        </div>
                        <div>
                            <div class="identity-meta-label">Department</div>
                            <span class="dept-badge">${emp.section}</span>
                        </div>
                    </div>
                    <div class="history">
                        <div class="history-label">
                            <i class="fa-solid fa-clock-rotate-left" style="font-size:11px;"></i>
                            Item-Wise Issue History
                        </div>
                        <div class="items-grid">${itemsHTML}</div>
                    </div>`;
                frag.appendChild(el);
            });
            deck.appendChild(frag);
        }

        function debounceSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(filterData, 200);
        }
        function filterData() {
            const c = document.getElementById('search-card').value.toLowerCase().trim();
            const n = document.getElementById('search-name').value.toLowerCase().trim();
            const d = document.getElementById('search-dept').value.toLowerCase().trim();
            const it = document.getElementById('search-item').value.toLowerCase().trim();
            currentFilteredData = allMasterData.filter(e =>
                e.cardNo.toLowerCase().includes(c) &&
                e.name.toLowerCase().includes(n) &&
                e.section.toLowerCase().includes(d) &&
                e.item.toLowerCase().includes(it)
            );
            goToPage(1);
        }
        function goToPage(p) { currentPage = p; renderTableMatrix(); }
        function changePage(d) { currentPage += d; renderTableMatrix(); }
        function resetFilters() {
            ['search-card','search-name','search-dept','search-item'].forEach(id => document.getElementById(id).value = '');
            currentFilteredData = [...allMasterData];
            goToPage(1);
        }
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(r => console.log('SW registered', r))
                    .catch(e => console.error('SW error', e));
            });
        }
    </script>
</body>
</html>
